name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://web-documents.deviaaps.com' }}

  # ── Deploy (master only) ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Write .env.production and copy to VM
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AWS_USERNAME: ${{ secrets.AWS_USERNAME }}
          AWS_PASSWORD: ${{ secrets.AWS_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_URL: ${{ secrets.AWS_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          MAILHOG_HOST: ${{ secrets.MAILHOG_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
        run: |
          printf 'MONGODB_URI=%s\n'   "$MONGODB_URI"   >  /tmp/env.production
          printf 'MONGODB_DB=%s\n'    "$MONGODB_DB"    >> /tmp/env.production
          printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET" >> /tmp/env.production
          printf 'AWS_USERNAME=%s\n'  "$AWS_USERNAME"  >> /tmp/env.production
          printf 'AWS_PASSWORD=%s\n'  "$AWS_PASSWORD"  >> /tmp/env.production
          printf 'AWS_REGION=%s\n'    "$AWS_REGION"    >> /tmp/env.production
          printf 'AWS_URL=%s\n'       "$AWS_URL"       >> /tmp/env.production
          printf 'AWS_BUCKET=%s\n'    "$AWS_BUCKET"    >> /tmp/env.production
          printf 'MAILHOG_HOST=%s\n'  "$MAILHOG_HOST"  >> /tmp/env.production
          printf 'MAIL_PORT=%s\n'     "$MAIL_PORT"     >> /tmp/env.production
          printf 'NEXT_PUBLIC_API_URL=https://web-documents.deviaaps.com\n' >> /tmp/env.production
          printf 'NODE_ENV=production\n' >> /tmp/env.production

          ssh -i ~/.ssh/deploy_key "$VM_USER@$VM_HOST" "mkdir -p ~/MISEIA1-1-100_web-documents"
          scp -i ~/.ssh/deploy_key /tmp/env.production "$VM_USER@$VM_HOST:~/MISEIA1-1-100_web-documents/.env.production"

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VM_USER@$VM_HOST" bash << 'ENDSSH'
          set -e
          mkdir -p ~/MISEIA1-1-100_web-documents
          cd ~/MISEIA1-1-100_web-documents

          # Works whether dir is empty, has .env.production, or already has a repo
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/Jorgeaapaz/MISEIA_1-1-100-web-documents.git
          fi
          git fetch origin master
          git reset --hard origin/master
          # .env.production is gitignored so reset --hard leaves it untouched

          docker build -t web-documents:latest .
          docker rm -f web-documents 2>/dev/null || true
          docker run -d \
            --name web-documents \
            --restart unless-stopped \
            --network miseia-net \
            --env-file ~/MISEIA1-1-100_web-documents/.env.production \
            --label 'traefik.enable=true' \
            --label 'traefik.http.routers.web-documents.rule=Host(`web-documents.deviaaps.com`)' \
            --label 'traefik.http.routers.web-documents.entrypoints=websecure' \
            --label 'traefik.http.routers.web-documents.tls=true' \
            --label 'traefik.http.routers.web-documents.tls.certresolver=cloudflare' \
            --label 'traefik.http.services.web-documents.loadbalancer.server.port=3000' \
            web-documents:latest

          sleep 5
          docker ps --filter name=web-documents --filter status=running | grep web-documents
          echo "Deploy completed successfully"
          ENDSSH
